    <script type="module">
        import { EngineSwitch } from './core/engine-switch.js';
        import { TemporalEngine } from './core/TemporalEngine.js';
        import { TokenDrift } from './core/TokenDrift.js';
        import { TrafficEmulator } from './core/TrafficEmulator.js';
        import { SovereignGateway } from './core/SovereignGateway.js';
        import { RevenueController } from './core/RevenueController.js';
        import { NeuralRepair } from './core/NeuralRepair.js';
        import { PersistenceWarden } from './core/PersistenceWarden.js';
        import { NexusController } from './core/NexusController.js';
        import { ForgeController } from './core/ForgeController.js';
        import { ExecutiveBriefing } from './core/ExecutiveBriefing.js';
        import { SwarmPulse } from './core/SwarmPulse.js';
        import { NodeGenesis } from './core/NodeGenesis.js';
        import { InfraManager } from './core/InfraManager.js';
        
        window.engineSwitch = new EngineSwitch();
        window.temporalEngine = new TemporalEngine();
        window.tokenDrift = new TokenDrift('token-drift-canvas');
        window.trafficEmulator = new TrafficEmulator(window.supabaseClient);
        window.sovereignGateway = new SovereignGateway(window.supabaseClient);
        window.revenueController = new RevenueController(window.supabaseClient);
        window.directiveValidator = new (await import('./core/DirectiveValidator.js')).DirectiveValidator(window.supabaseClient);
        window.riskCalculus = new (await import('./core/RiskCalculus.js')).RiskCalculus(window.supabaseClient);
        window.persistenceWarden = new PersistenceWarden(window.supabaseClient);
        window.neuralRepair = new NeuralRepair(window.supabaseClient);
        window.nexusController = new NexusController(window.supabaseClient);
        window.forgeController = new ForgeController(window.supabaseClient);
        window.executiveBriefing = new ExecutiveBriefing(window.supabaseClient);
        window.swarmPulse = new SwarmPulse(window.supabaseClient);
        window.nodeGenesis = new NodeGenesis(window.supabaseClient);
        window.infraManager = new InfraManager(window.supabaseClient);
        
        window.onload = () => {
            const firstButton = document.querySelector('#top-nav button');
            if (firstButton) window.switchTab('dashboard', firstButton);
            
            document.getElementById('nexus-form').addEventListener('submit', handleDispatch);
            subscribeToRealtime();
            setInterval(() => { 
                const clock = document.getElementById('clock');
                if(clock) clock.innerText = new Date().toISOString().substring(11, 19) + ' UTC'; 
            }, 1000);
            
            // Start Services
            window.trafficEmulator.start();
            window.sovereignGateway.init();
            window.revenueController.init();
            window.persistenceWarden.init();
            window.neuralRepair.init();
            window.forgeController.init();
            window.nodeGenesis.init();
            
            initForgeTab();
            initNodeGenesis();
        };

        window.switchTab = function(name, el) {
            const pill = document.getElementById('nav-pill');
            if (pill && el) {
                pill.style.width = el.offsetWidth+'px'; pill.style.height = el.offsetHeight+'px';
                pill.style.left = el.offsetLeft+'px'; pill.style.top = el.offsetTop+'px';
            }
            document.querySelectorAll('#top-nav button').forEach(b => { b.classList.add('text-white/40'); b.classList.remove('text-gold'); });
            if (el) { el.classList.remove('text-white/40'); el.classList.add('text-gold'); }
            
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            const tab = document.getElementById(name+'-tab');
            if (tab) tab.classList.add('active');
            
            if(name==='dashboard') loadDashboard();
            if(name==='analytics') loadAnalytics();
            if(name==='content') loadContent();
            if(name==='agents') { loadAgents(); window.swarmPulse.init('swarm-pulse-viz'); }
            if(name==='forge') loadForge();
            if(name==='revenue') loadRevenue();
            if(name==='tasks') loadTasks();
            if(name==='infrastructure') { loadInfrastructure(); loadExpansionData(); }
            if(name==='trace') loadTrace();
            if(name==='command') loadCommand();
            if(name==='growth') loadGrowth();
            if(name==='explorer') window.nexusController.init();
            if(name==='governance') loadGovernance();
            if(name==='loopshield') loadLoopShield();
        }
    </script>

        /* [SH-1100] Swarm Pulse Visuals */
        #swarm-pulse-wrapper { height: 450px; background: rgba(10, 10, 10, 0.4); border: 1px solid rgba(212, 175, 55, 0.1); border-radius: 24px; position: relative; overflow: hidden; }

        /* [SH-1200] Forge Styles */
        #forge-incubator-ring { transition: stroke-dashoffset 1s linear; transform: rotate(-90deg); transform-origin: center; }
        .forge-phase-indicator { transition: all 0.5s ease; opacity: 0.3; filter: grayscale(1); }

        .command-orb-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: auto; z-index: 1000; cursor: pointer; }
        .command-orb { width: 180px; height: 180px; background: radial-gradient(circle, #D4AF37 0%, transparent 70%); border-radius: 50%; filter: blur(15px); animation: orb-pulse 6s infinite ease-in-out; opacity: 0.6; }

        /* [SH-1900] Persistence HUD Styles */
        @keyframes sync-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .syncing-ring {
            animation: sync-rotate 2s linear infinite;
            stroke: #00FFFF !important;
            stroke-dasharray: 70 213 !important;
        }
        .warning-ring {
            stroke: #EF4444 !important;
            animation: pulse-red 1.5s infinite;
        }
        @keyframes pulse-red {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
        #persistence-hud { background: rgba(0, 255, 255, 0.02); }

        /* [SH-2000] Singularity Pulse Styles */
        .pulse-healthy { color: #00FFFF; }
        .pulse-repairing { color: #FF3131; }
        
        @keyframes singularity-breathe {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }
        
        @keyframes singularity-erratic {
            0% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(2deg); }
            50% { transform: scale(0.9) rotate(-2deg); }

            100% { transform: scale(1); }

            // Start Services
            window.trafficEmulator.start();

        window.switchTab = function(name, el) {
            const pill = document.getElementById('nav-pill');
            if (pill && el) {
                pill.style.width = el.offsetWidth+'px'; pill.style.height = el.offsetHeight+'px';
                pill.style.left = el.offsetLeft+'px'; pill.style.top = el.offsetTop+'px';
            }
            document.querySelectorAll('#top-nav button').forEach(b => { b.classList.add('text-white/40'); b.classList.remove('text-gold'); });
            if (el) { el.classList.remove('text-white/40'); el.classList.add('text-gold'); }
            
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            const tab = document.getElementById(name+'-tab');
            if (tab) tab.classList.add('active');
            
            if(name==='dashboard') loadDashboard();
            if(name==='analytics') loadAnalytics();
            if(name==='content') loadContent();
            if(name==='agents') { loadAgents(); window.swarmPulse.init('swarm-pulse-viz'); }

            if(name==='revenue') loadRevenue();

            if(name==='infrastructure') { loadInfrastructure(); loadExpansionData(); }

            if(name==='command') loadCommand();
            if(name==='growth') loadGrowth();
            if(name==='explorer') window.nexusController.init();
            if(name==='governance') loadGovernance();
            if(name==='loopshield') loadLoopShield();
        }

<body class="h-screen w-screen flex flex-col font-sans">

    <!-- Supabase Configuration -->
    
    <script>
        // [SH-2000] Singularity Pulse UI Interaction Logic
        window.addEventListener('neural-event', (e) => {
            const diagnostic = e.detail;
            document.querySelectorAll('.diagnostic-matrix-feed').forEach(feed => {
                const statusClass = diagnostic.severity_level >= 3 ? 'status-healing' : 'status-nominal';
                const statusText = diagnostic.severity_level >= 3 ? 'CRITICAL_FAILURE' : 'WARNING';
                
                const entry = document.createElement('div');
                entry.className = `diagnostic-matrix-item ${statusClass} p-2 rounded-r bg-white/[0.01] animate-pulse`;
                entry.innerHTML = `
                    <div class="flex justify-between font-bold"><span>[${diagnostic.error_type}] ${diagnostic.source_component}</span><span>${statusText}</span></div>
                    <p class="text-[8px] text-white/40 mt-1 italic">${diagnostic.error_payload.message}</p>
                `;
                feed.insertBefore(entry, feed.firstChild);
            });
        });

        window.addEventListener('immune-response-active', (e) => {
            if(window.neuralRepair) window.neuralRepair.updateUIState('REPAIRING');
            setTimeout(() => {
                if(window.neuralRepair) window.neuralRepair.updateUIState('NOMINAL');
            }, 8000);
        });

        async function loadExpansionData() {
            console.log("[GENESIS] Refreshing Global Capacity...");
            const { data: nodes } = await window.supabaseClient.from('infrastructure_nodes').select('*');
            if(!nodes) return;

            const active = nodes.filter(n => n.status === 'ONLINE');
            const totalCpu = active.reduce((sum, n) => sum + 4, 0) + 8;
            const totalRam = active.reduce((sum, n) => sum + 8, 0) + 16;
            const totalVram = active.filter(n => n.instance_type.includes('RTX')).reduce((sum, n) => sum + 24, 0);
            
            const cpuFill = document.getElementById('cap-cpu-bar');
            const ramFill = document.getElementById('cap-ram-bar');
            const vramFill = document.getElementById('cap-vram-bar');
            
            const cpuVal = document.getElementById('cap-cpu-val');
            const ramVal = document.getElementById('cap-ram-val');
            const vramVal = document.getElementById('cap-vram-val');

            if(cpuFill) cpuFill.style.width = Math.min(100, (totalCpu/64)*100) + '%';
            if(ramFill) ramFill.style.width = Math.min(100, (totalRam/128)*100) + '%';
            if(vramFill) vramFill.style.width = Math.min(100, (totalVram/96)*100) + '%';
            
            if(cpuVal) cpuVal.innerText = totalCpu;
            if(ramVal) ramVal.innerText = totalRam;
            if(vramVal) vramVal.innerText = totalVram;

            const timeline = document.getElementById('provisioning-timeline');
            if(timeline) {
                const provisioning = nodes.filter(n => n.status !== 'ONLINE' && n.status !== 'OFFLINE');
                timeline.innerHTML = provisioning.map(n => {
                    const progress = n.status === 'PROVISIONING' ? 25 : (n.status === 'BOOTING' ? 50 : 75);
                    return `
                        <div class="flex gap-6 items-start group animate-fadeIn">
                            <div class="flex flex-col items-center gap-2">
                                <div class="w-3 h-3 rounded-full bg-cyan shadow-[0_0_10px_#00FFFF] animate-pulse"></div>
                                <div class="w-[1px] h-20 bg-gradient-to-b from-cyan to-transparent"></div>
                            </div>
                            <div class="glass-card p-6 flex-1 border-cyan/20 bg-cyan/[0.02]">
                                <div class="flex justify-between mb-4">
                                    <h4 class="text-white font-bold text-sm font-mono tracking-tighter">${n.node_name}</h4>
                                    <span class="text-[9px] font-mono text-cyan uppercase animate-pulse">${n.status}...</span>
                                </div>
                                <div class="grid grid-cols-4 gap-4 text-[9px] font-mono text-white/20 uppercase mb-4">
                                    <div class="${progress >= 25 ? 'text-cyan' : ''}">1. REQUESTED</div>
                                    <div class="${progress >= 50 ? 'text-cyan' : ''}">2. PROVISIONING</div>
                                    <div class="${progress >= 75 ? 'text-cyan' : ''}">3. BOOTING</div>
                                    <div class="text-white/10">4. ONLINE</div>
                                </div>
                                <div class="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full bg-cyan transition-all duration-1000" style="width: ${progress}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('') || '<div class="h-full flex items-center justify-center text-[9px] text-white/10 uppercase tracking-[0.4em]">Fleet_Homeostasis_Achieved</div>';
            }
        }

        window.switchInfraTab = function(view, el) {
            document.getElementById('infra-fleet-view').classList.add('hidden');
            document.getElementById('infra-expansion-view').classList.add('hidden');
            document.getElementById(`infra-${view}-view`).classList.remove('hidden');
            
            document.querySelectorAll('.infra-sub-nav-btn').forEach(b => {
                b.classList.remove('text-gold', 'active');
                b.classList.add('text-white/20');
            });
            el.classList.add('text-gold', 'active');
            el.classList.remove('text-white/20');
            
            if(view === 'expansion') loadExpansionData();
        }

        window.triggerManualScale = async function() {
            if(!confirm("MANUAL_SCALE_UP: Provision additional physical node?")) return;
            if(window.infraManager) {
                await window.infraManager.provisionNewNode('RUNPOD');
                loadExpansionData();
            }
        }

        function initNodeGenesis() {
            console.log("[GENESIS] Initializing Real-time Infrastructure Monitoring...");
            window.supabaseClient
                .channel('public:infrastructure_nodes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'infrastructure_nodes' }, () => {
                    loadExpansionData();
                })
                .subscribe();
        }
    </script>
