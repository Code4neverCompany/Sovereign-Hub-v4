    <script src="/js/SwarmPulse.js"></script>
    <script>
      (function() {
        const supabaseUrl = 'https://your-project.supabase.co';
        const supabaseKey = 'your-anon-key';
        const supabase = supabasejs.createClient(supabaseUrl, supabaseKey);

        window.broadcastInsight = async function(agentId, sessionId, insight, relevanceScore = 1.0) {
          console.log('🛰️ Broadcasting to Swarm:', { agentId, insight });
          const { error } = await supabase.from('swarm_knowledge').insert([{
            agent_id: agentId,
            session_id: sessionId,
            insight_json: insight,
            relevance_score: relevanceScore,
            timestamp: new Date().toISOString()
          }]);
          if (error) console.error('Swarm Broadcast Error:', error);
        };

        window.listenToSwarm = function(callback) {
          console.log('🛰️ Listening to Swarm Pulse...');
          return supabase.channel('swarm_knowledge_changes')
            .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'swarm_knowledge' }, (payload) => {
              callback(payload.new);
            })
            .subscribe();
        };

        window.addEventListener('DOMContentLoaded', () => {
          if (typeof SwarmPulse !== 'undefined') {
            const pulse = new SwarmPulse('swarm-pulse-container');
            window.listenToSwarm((insight) => {
              console.log('🛰️ Swarm Insight Received:', insight);
              pulse.addNode({ id: insight.agent_id, name: insight.agent_id });
              pulse.addPulse(insight.agent_id, 'hive', insight.relevance_score > 0.8 ? '#ff0055' : '#00f3ff');
            });
          }
        });
      })();
    </script>
